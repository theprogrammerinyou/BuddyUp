<!DOCTYPE html>

<html class="dark" lang="en"><head>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-input {
            background: rgba(57, 22, 72, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        ::-webkit-calendar-picker-indicator {
            filter: invert(72%) sepia(87%) saturate(326%) hue-rotate(222deg) brightness(103%) contrast(101%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body min-h-screen selection:bg-secondary selection:text-on-secondary">
<!-- TopAppBar Shell -->
<header class="fixed top-0 w-full z-50 bg-[#1a0425]/40 backdrop-blur-xl shadow-[0_0_48px_0_rgba(223,142,255,0.1)]">
<div class="flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button class="text-[#df8eff] hover:scale-105 transition-transform duration-200 active:scale-95">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-[#df8eff] font-['Epilogue'] font-bold text-2xl tracking-tight">Create Activity</h1>
</div>
<div class="text-[#df8eff]/60 font-label text-xs tracking-widest uppercase">Step 2 of 3</div>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto space-y-10">
<!-- Hero Section Header -->
<section class="space-y-2">
<span class="text-secondary font-label text-xs font-bold tracking-[0.2em] uppercase">Activity Details</span>
<h2 class="font-headline text-4xl md:text-5xl font-black italic tracking-tighter text-primary">
                SET THE VIBE
            </h2>
</section>
<!-- Form Canvas -->
<div class="space-y-8">
<!-- Activity Title -->
<div class="group">
<label class="block font-label text-xs font-bold text-primary/70 mb-3 tracking-widest uppercase">Activity Title</label>
<input class="w-full glass-input border-none rounded-lg p-5 text-xl font-headline placeholder:text-outline-variant/50 focus:ring-2 focus:ring-primary/50 transition-all outline-none" placeholder="What's the plan?" type="text"/>
</div>
<!-- Description -->
<div class="group">
<label class="block font-label text-xs font-bold text-primary/70 mb-3 tracking-widest uppercase">Description</label>
<textarea class="w-full glass-input border-none rounded-lg p-5 text-lg font-body placeholder:text-outline-variant/50 focus:ring-2 focus:ring-primary/50 transition-all outline-none resize-none" placeholder="Tell the circle more about this mission..." rows="4"></textarea>
</div>
<!-- Date & Time Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="group">
<label class="block font-label text-xs font-bold text-primary/70 mb-3 tracking-widest uppercase">Date &amp; Time</label>
<div class="relative">
<input class="w-full glass-input border-none rounded-lg p-5 font-body text-primary focus:ring-2 focus:ring-primary/50 transition-all outline-none appearance-none" type="datetime-local"/>
</div>
</div>
<div class="group">
<label class="block font-label text-xs font-bold text-primary/70 mb-3 tracking-widest uppercase">Privacy</label>
<div class="flex items-center gap-2 p-2 glass-input rounded-full">
<button class="flex-1 py-3 px-4 rounded-full bg-primary text-on-primary font-bold text-sm transition-all shadow-[0_0_20px_rgba(223,142,255,0.3)]">Public</button>
<button class="flex-1 py-3 px-4 rounded-full text-primary/50 font-bold text-sm hover:text-primary transition-all">Private</button>
</div>
</div>
</div>
<!-- Location with Map Preview -->
<div class="space-y-4">
<div class="group">
<label class="block font-label text-xs font-bold text-primary/70 mb-3 tracking-widest uppercase">Location</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-primary" data-icon="location_on">location_on</span>
<input class="w-full glass-input border-none rounded-t-lg p-5 pl-14 font-body text-on-background placeholder:text-outline-variant/50 focus:ring-2 focus:ring-primary/50 transition-all outline-none" placeholder="Search a venue or address" type="text"/>
</div>
<!-- Map Preview Bento -->
<div class="relative h-48 w-full overflow-hidden rounded-b-lg border-t border-outline-variant/10">
<img class="w-full h-full object-cover grayscale brightness-50 contrast-125" data-alt="Stylized neon dark themed city map view" data-location="Tokyo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAW0cAI298kDMdev2l2CQO8f-4kFvaITqUTrK_8oF6DlVl3yxlqJytkI_3oHJzgwTwupWrccUxuhxnFLf6LvfuonrprpndroompURP4gZlkNNwyoz3eFZKHzwKAd2FHYyeXVMlOY4gKAKay_4u0OnYr3vKMgq5fTcYaMv1M2wDWJbZFVfHJdGMrzDJl0wOVjQ3uByF5_dqc6Uq-muq3lD7GlJ01XlUhyHejzUUhGJQlL55vaGptnBngSE8_ZZLpNwxlnE0LPZIFYw"/>
<div class="absolute inset-0 bg-gradient-to-t from-background/80 to-transparent"></div>
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-12 h-12 bg-secondary rounded-full flex items-center justify-center shadow-[0_0_30px_#2ff801] animate-pulse">
<span class="material-symbols-outlined text-on-secondary" data-icon="explore">explore</span>
</div>
</div>
</div>
</div>
</div>
</div>
<!-- Post Action Section -->
<div class="pt-6">
<button class="w-full bg-secondary py-6 rounded-full flex items-center justify-center gap-3 hover:scale-[1.02] active:scale-95 transition-all shadow-[0_0_40px_rgba(47,248,1,0.25)] group">
<span class="font-headline text-on-secondary font-black text-xl tracking-tighter uppercase italic">Post Activity</span>
<span class="material-symbols-outlined text-on-secondary text-2xl group-hover:translate-x-1 transition-transform" data-icon="rocket_launch">rocket_launch</span>
</button>
<p class="text-center mt-6 text-outline-variant text-sm font-label">
                By posting, you agree to our <a class="text-primary hover:underline" href="#">Circle Guidelines</a>
</p>
</div>
</main>
<!-- Navigation Shell Suppressed for Task-Focused Flow as per Semantic Shell Mandate -->
<!-- BottomNavBar would be here but is hidden for Focused Journey -->
</body></html>
